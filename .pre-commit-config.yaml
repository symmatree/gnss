repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # general text file...stuff.
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args:
          - --fix=lf

      # git repo defense
      - id: check-added-large-files
      - id: check-merge-conflict
        args:
          - --assume-in-merge
      # Also checked by github but prevent locally.
      - id: no-commit-to-branch

      # filesystem checks
      # not a strong position but I'd like to think about it.
      - id: check-illegal-windows-names
      - id: check-case-conflict
      - id: check-symlinks

      # Leaks and stuff
      - id: detect-private-key

      # Language specific
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-json
      - id: check-toml
      - id: check-yaml
        args:
          - --allow-multiple-documents
        exclude: ".*\\.helm\\.yaml"

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.11.0-1
    hooks:
      - id: shfmt # prebuilt upstream executable

  # Local because the alternative,
  # https://github.com/koalaman/shellcheck-precommit requires docker.
  - repo: local
    hooks:
      # Requires apt-get install shellcheck
      - id: shellcheck
        name: shellcheck
        # Vendored script.
        exclude: ^ci-tools/eget.sh
        description: Test shell scripts with shellcheck
        entry: shellcheck
        language: python
        types: [shell]
        require_serial: true # shellcheck can detect sourcing this way

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet
      - id: validate-toml
      - id: no-go-testing
      - id: go-mod-tidy
      # On probation:
      - id: go-unit-tests
      - id: go-build
      # Require install of tools:
      # - id: go-lint
      # - id: go-imports
      #- id: go-cyclo
      #  args: [-over=15]
      #- id: golangci-lint
      #- id: go-critic
